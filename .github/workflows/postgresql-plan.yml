# =============================================================================
# postgresql-plan.yml — validate + plan STATE 1 (foundation). SP client-secret (POC).
# Note: pin third-party actions to commit SHAs per your policy before enabling.
# =============================================================================
name: postgresql-plan

on:
  pull_request:
    paths:
      - "terraform/01-postgresql-foundation/**"
      - ".github/workflows/postgresql-plan.yml"
  workflow_dispatch: {}

permissions:
  contents: read
  pull-requests: write   # plan comment

concurrency:
  group: terraform-postgresql-foundation-${{ github.event.inputs.environment || 'dev' }}
  cancel-in-progress: false

env:
  TF_ROOT: terraform/01-postgresql-foundation
  ARM_CLIENT_ID: ${{ vars.AZURE_CLIENT_ID }}
  ARM_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
  ARM_TENANT_ID: ${{ vars.AZURE_TENANT_ID }}
  ARM_SUBSCRIPTION_ID: ${{ vars.AZURE_SUBSCRIPTION_ID }}

jobs:
  validate-and-plan:
    runs-on: ubuntu-latest
    environment: dev
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.9.8

      - name: Terraform fmt (check)
        run: terraform -chdir=${{ env.TF_ROOT }} fmt -check -recursive

      - name: Terraform init (no backend for validate)
        run: terraform -chdir=${{ env.TF_ROOT }} init -backend=false

      - name: Terraform validate
        run: terraform -chdir=${{ env.TF_ROOT }} validate

      - name: tflint
        uses: terraform-linters/setup-tflint@v4
        with:
          tflint_version: latest
      - run: tflint --chdir=${{ env.TF_ROOT }} --init && tflint --chdir=${{ env.TF_ROOT }}

      - name: Checkov (IaC scan)
        uses: bridgecrewio/checkov-action@v12
        with:
          directory: ${{ env.TF_ROOT }}
          quiet: true
          soft_fail: false

      - name: Azure login (service principal)
        run: |
          az login --service-principal \
            -u "${{ vars.AZURE_CLIENT_ID }}" \
            -p "${{ secrets.AZURE_CLIENT_SECRET }}" \
            --tenant "${{ vars.AZURE_TENANT_ID }}" >/dev/null
          az account set --subscription "${{ vars.AZURE_SUBSCRIPTION_ID }}"

      - name: Terraform init (backend)
        run: terraform -chdir=${{ env.TF_ROOT }} init -backend-config=backend.hcl

      - name: Terraform plan
        run: terraform -chdir=${{ env.TF_ROOT }} plan -input=false -out=tfplan
        # DB admin password (Option A) is injected via TF_VAR_postgresql_admin_password
        # sourced from Key Vault in a preceding step when password auth is used.

      - name: Upload plan artifact
        uses: actions/upload-artifact@v4
        with:
          name: state1-tfplan
          path: ${{ env.TF_ROOT }}/tfplan
          retention-days: 5
