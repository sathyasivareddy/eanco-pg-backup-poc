# =============================================================================
# backup-solution-apply.yml — apply STATE 2 after manual approval.
# Schedule stays disabled (enable_backup_schedule=false) until restore validated.
# =============================================================================
name: backup-solution-apply
 
on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        default: "dev"
      container_image:
        description: "Backup image by digest (optional; leave blank to keep current)"
        required: false
        default: ""
 
permissions:
  contents: read
 
concurrency:
  group: terraform-postgresql-backup-${{ github.event.inputs.environment }}
  cancel-in-progress: false
 
env:
  TF_ROOT: terraform/02-postgresql-backup-solution
  ARM_CLIENT_ID: ${{ vars.AZURE_CLIENT_ID }}
  ARM_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
  ARM_TENANT_ID: ${{ vars.AZURE_TENANT_ID }}
  ARM_SUBSCRIPTION_ID: ${{ vars.AZURE_SUBSCRIPTION_ID }}
 
jobs:
  apply:
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment }}
    steps:
      - uses: actions/checkout@v4
 
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.9.8
 
      - name: Azure login (service principal)
        run: |
          az login --service-principal \
            -u "${{ vars.AZURE_CLIENT_ID }}" \
            -p "${{ secrets.AZURE_CLIENT_SECRET }}" \
            --tenant "${{ vars.AZURE_TENANT_ID }}" >/dev/null
          az account set --subscription "${{ vars.AZURE_SUBSCRIPTION_ID }}"
 
      - name: Prepare Terraform backend config
        run: cp "${{ env.TF_ROOT }}/backend.hcl.example" "${{ env.TF_ROOT }}/backend.hcl"
 
      - name: Terraform init
        run: terraform -chdir=${{ env.TF_ROOT }} init -backend-config=backend.hcl
 
      - name: Terraform plan
        run: |
          EXTRA=""
          if [ -n "${{ github.event.inputs.container_image }}" ]; then
            EXTRA="-var=container_image=${{ github.event.inputs.container_image }}"
          fi
          terraform -chdir=${{ env.TF_ROOT }} plan -input=false $EXTRA -out=tfplan
 
      - name: Terraform apply
        run: terraform -chdir=${{ env.TF_ROOT }} apply -input=false tfplan
 
