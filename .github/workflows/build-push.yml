name: Build & push backup image

# Builds the pg-backup image and pushes it to Azure Container Registry using the
# ACR admin username/password. The Container Apps Job pulls this image when it runs.

on:
  push:
    branches: [ main ]
    paths:
      - 'src/**'
      - '.github/workflows/build-push.yml'
  workflow_dispatch:      # allow manual runs from the Actions tab

env:
  ACR_LOGIN_SERVER: ${{ vars.ACR_LOGIN_SERVER }}   # e.g. bdaze1ikpitcr01.azurecr.io
  IMAGE: pg-backup
  RESOURCE_GROUP: ${{ vars.RESOURCE_GROUP }}       # e.g. BDAZE1IKPITRG01
  JOB_NAME: ${{ vars.JOB_NAME }}                   # e.g. bdaze1ikpit-pgbackup-job

jobs:
  build-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to ACR (admin username/password)
        uses: docker/login-action@v3
        with:
          registry: ${{ vars.ACR_LOGIN_SERVER }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & push image
        uses: docker/build-push-action@v6
        with:
          context: ./src
          push: true
          tags: |
            ${{ vars.ACR_LOGIN_SERVER }}/${{ env.IMAGE }}:latest
            ${{ vars.ACR_LOGIN_SERVER }}/${{ env.IMAGE }}:${{ github.sha }}

      - name: Azure login (service principal)
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Point the Container Apps Job at the new image
        if: ${{ env.JOB_NAME != '' }}
        run: |
          az containerapp job update \
            --name "$JOB_NAME" \
            --resource-group "$RESOURCE_GROUP" \
            --image "${ACR_LOGIN_SERVER}/${IMAGE}:${GITHUB_SHA}"
