# =============================================================================
# container-deploy.yml — update the Container Apps Job to a specific image digest.
# Runs after container-build. Does not enable the schedule.
# =============================================================================
name: container-deploy

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        default: "dev"
      image_digest:
        description: "Full image reference by digest (e.g. acr.azurecr.io/eanco-pg-backup@sha256:...)"
        required: true

permissions:
  contents: read

concurrency:
  group: container-deploy-${{ github.event.inputs.environment }}
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment }}
    steps:
      - uses: actions/checkout@v7

      - name: Azure login (service principal)
        run: |
          az login --service-principal \
            -u "${{ vars.AZURE_CLIENT_ID }}" \
            -p "${{ secrets.AZURE_CLIENT_SECRET }}" \
            --tenant "${{ vars.AZURE_TENANT_ID }}" >/dev/null
          az account set --subscription "${{ vars.AZURE_SUBSCRIPTION_ID }}"

      - name: Update Container Apps Job image (by digest)
        run: |
          set -Eeuo pipefail
          az containerapp job update \
            --name "${{ vars.JOB_NAME }}" \
            --resource-group "${{ vars.RESOURCE_GROUP }}" \
            --image "${{ github.event.inputs.image_digest }}" \
            --set-env-vars "IMAGE_DIGEST=${{ github.event.inputs.image_digest }}"
          echo "Job updated to ${{ github.event.inputs.image_digest }}"
